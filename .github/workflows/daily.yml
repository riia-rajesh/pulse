name: Daily Pulse

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  run-pulse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Pulse Bot
        run: python bot.py